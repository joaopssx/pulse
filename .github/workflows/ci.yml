name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-go:
    name: test-go
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - run: go mod tidy
      - run: go vet ./...
      - run: go test ./... -race -cover

  test-python:
    name: test-python
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: bot/requirements.txt

      - run: pip install -r bot/requirements.txt
      - run: pip install pytest

      - name: Run pytest
        run: |
          if find bot -type f \( -name 'test_*.py' -o -name '*_test.py' \) | grep -q .; then
            pytest bot/
          else
            echo "No tests found in bot/, skipping."
          fi

  lint-go:
    name: lint-go
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build-go:
    name: build-go
    runs-on: ubuntu-latest
    needs: test-go
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - run: go build -o pulse ./cmd/pulse

      - uses: actions/upload-artifact@v4
        with:
          name: pulse-binary
          path: pulse
          if-no-files-found: error
